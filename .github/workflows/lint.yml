name: lint

on:
  push:
    paths:
      - '**/*.sh'
      - 'tools/**/*.py'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.sh'
      - 'tools/**/*.py'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          set -euo pipefail
          # -S warning: fail on warnings too (the scripts are clean at this bar).
          # SC1091 = "can't follow sourced file": the PortMaster launcher sources
          # framework files (funcs.txt, control.txt) that live on-device, not in
          # the repo. The launcher carries an inline directive for the framework-
          # sourced vars it can't see (SC1090/SC2154).
          find . -path ./.git -prune -o -name '*.sh' -print0 \
            | xargs -0 shellcheck -S warning -e SC1091

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Byte-compile the pixeldemaster tools
        run: python -m py_compile tools/pixeldemaster/*.py
